<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID | Recovered Log // Galaxy Rotation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow-y: scroll;
            scrollbar-width: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 45vh; 
            padding-bottom: 25vh;
        }
        body::-webkit-scrollbar { display: none; }
        
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* BACK BUTTON */
        .back-btn {
            position: fixed; top: 40px; left: 40px; z-index: 200;
            display: flex; align-items: center; gap: 12px;
            color: rgba(255, 255, 255, 0.4); text-decoration: none;
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            letter-spacing: 3px; transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        .back-btn:hover {
            color: #fff; border-color: #fff; padding-left: 20px;
            background: rgba(255, 255, 255, 0.05);
        }

        .bg-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 14vw; font-weight: 900; opacity: 0.02; z-index: -1; 
            text-transform: uppercase; letter-spacing: 40px; pointer-events: none;
            white-space: nowrap; filter: blur(1px);
        }

        #storyContainer {
            max-width: 850px; width: 90%; position: relative; z-index: 10;
        }

        .cursor { 
            display: inline-block; width: 10px; height: 28px; background: #fff; 
            animation: blink 0.8s infinite; vertical-align: middle; margin-left: 8px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .data-line {
            color: #22c55e; font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem; opacity: 0.9; letter-spacing: 1px;
        }

        .scanlines {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 100; pointer-events: none; opacity: 0.4;
        }
    </style>
</head>
<body>

    <a href="riddle.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        RETURN_TO_TERMINAL
    </a>

    <div class="scanlines"></div>
    <div id="bgWord" class="bg-text">ROTATION</div>

    <div id="storyContainer">
        <div class="text-xl md:text-3xl leading-relaxed text-gray-300 font-light italic">
            <span id="typingArea"></span><span id="cursor" class="cursor"></span>
        </div>
    </div>

    <div class="fixed bottom-10 w-full px-12 flex justify-between items-center mono text-[9px] text-gray-700 tracking-[6px] uppercase">
        <div class="flex items-center gap-4">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            UPLINK_STABLE // ARCHIVE_NODE_08
        </div>
        <div>ANOMALY: DARK_MATTER_FLUX</div>
    </div>

    <script>
        const storyContent = [
            "“We mapped the rotation again. Same result. Too fast. Impossible.",
            "There isn’t enough visible matter to hold it together.",
            "But it doesn’t fall apart.",
            "Something unseen is there—everywhere, holding everything in place.",
            "Not interacting. Not speaking. Just… present.",
            "And for the first time, we stopped asking what dark matter is…",
            "and started wondering why it’s watching everything spin.”",
            "DIVIDER", 
            "REPORT: Yes. Galaxies rotate via vast gravitational systems.",
            "DETECTION: Observed via Doppler shifts—blue-shifted approaching, red-shifted receding.",
            "REAL_EVENT: 1970s. Vera Rubin measured rotation curves and discovered the anomaly.",
            "PHYSICS: Galaxies move too fast for visible mass; Dark Matter provides the necessary tether.",
            "STATUS: Without the unseen, galaxies would tear themselves apart. We remain anchored by shadows."
        ];

        let lineIndex = 0;
        let charIndex = 0;
        const typingArea = document.getElementById('typingArea');

        function typeLetter() {
            if (lineIndex < storyContent.length) {
                const currentLine = storyContent[lineIndex];

                if (currentLine === "DIVIDER") {
                    typingArea.appendChild(document.createElement('br'));
                    const hr = document.createElement('hr');
                    hr.style.cssText = "border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 40px 0; width: 80px;";
                    typingArea.appendChild(hr);
                    lineIndex++;
                    setTimeout(typeLetter, 800);
                    return;
                }

                if (charIndex < currentLine.length) {
                    const span = document.createElement('span');
                    span.innerText = currentLine[charIndex];
                    
                    if (lineIndex > 7) {
                        span.className = "data-line";
                        typingArea.parentElement.classList.remove('italic');
                    }

                    typingArea.appendChild(span);
                    charIndex++;

                    // AUTO-SCROLL
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                    
                    let speed = (lineIndex > 7) ? 15 : 45;
                    setTimeout(typeLetter, speed);
                } else {
                    typingArea.appendChild(document.createElement('br'));
                    typingArea.appendChild(document.createElement('br'));
                    
                    lineIndex++;
                    charIndex = 0;
                    
                    let pause = (lineIndex === 8) ? 2000 : 1000;
                    setTimeout(typeLetter, pause);
                }
            }
        }

        window.onload = () => {
            setTimeout(typeLetter, 1200);
        };
    </script>
</body>
</html>
