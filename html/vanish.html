<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The VOID</title>
    <style>
        body, html {
    margin: 0;
    padding: 0;
    background-color: #000; /* The "End State" of the vanish */
    overflow: hidden;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', Courier, monospace;
}

.main-container {
    text-align: center;
    color: white;
    transition: all 2s ease-in-out;
}

.logo {
    font-size: 5rem;
    letter-spacing: 15px;
    margin: 0;
    font-weight: 900;
}

.status {
    letter-spacing: 3px;
    font-size: 0.8rem;
    opacity: 0.6;
}

/* This class is added by JavaScript to trigger the vanish */
.vanish-effect {
    opacity: 0;
    filter: blur(30px) brightness(0);
    transform: scale(0.9); /* Shrinks slightly as it disappears */
    pointer-events: none;
}
    </style>
</head>
<body>

    <div id="canvas" class="main-container">
        <div class="content">
            <h1 class="logo">VOID</h1>
            <p class="status">SYSTEM CONNECTING...</p>
        </div>
    </div>

    <script>
window.onload = () => {
    // This finds the box with id="canvas"
    const page = document.getElementById('canvas');

    if (page) {
        
        setTimeout(() => {
            console.log("Starting vanish...");
            page.classList.add('vanish-effect');
        }, 200);
        
      setTimeout(function() {
      window.location.href = "timeline.html";
    }, 800);
    } else {
        console.error("Could not find the element with id 'canvas'");
    }
};
</script>
</body>
</html>
